<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">📋 <span>AttendApp</span></div>
    <nav>
      <button class="nav-item active" onclick="showSection('overview')">📊 &nbsp; My Attendance</button>
      <button class="nav-item" onclick="showSection('select')">🔄 &nbsp; Change Student</button>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" class="btn btn-ghost btn-full">← Back to Home</a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">

    <!-- Topbar -->
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1 id="page-title">My Attendance</h1>
      </div>
      <div class="topbar-right">
        <span style="font-size:13px;color:var(--gray-400);" id="student-label">Student View</span>
      </div>
    </div>

    <!-- ── Roll Number Login Section ── -->
    <div id="section-select">
      <div style="max-width:400px;margin:40px auto;">
        <div class="card pop-in" style="text-align:center;padding:40px 32px;">
          <div style="font-size:48px;margin-bottom:12px;">🧑‍🎓</div>
          <h2 style="font-size:20px;font-weight:700;margin-bottom:6px;">Student Login</h2>
          <p style="color:var(--gray-400);font-size:14px;margin-bottom:28px;">Enter your roll number to view your attendance</p>
          <div class="form-group" style="text-align:left;">
            <label>Roll Number</label>
            <input type="text" id="roll-input" placeholder="e.g. 814724104096" onkeydown="if(event.key==='Enter') loginByRoll()" style="text-transform:uppercase;" />
          </div>
          <p id="roll-error" style="color:var(--red);font-size:13px;margin-bottom:12px;display:none;">❌ Roll number not found. Please try again.</p>
          <button class="btn btn-primary btn-full" onclick="loginByRoll()">View My Attendance →</button>
        </div>
      </div>
    </div>

    <!-- ── Overview Section ── -->
    <div id="section-overview" style="display:none;">
      <div class="stats-grid" id="student-stats"></div>

      <!-- Progress card -->
      <div class="card fade-in" style="margin-bottom:24px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:14px;font-weight:600;">Attendance Rate</span>
          <span id="pct-label" style="font-size:14px;font-weight:700;color:var(--blue);">0%</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
      </div>

      <!-- Attendance log -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Day</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="att-log-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script src="js/data.js"></script>
<script src="js/student.js"></script>
</body>
</html>
